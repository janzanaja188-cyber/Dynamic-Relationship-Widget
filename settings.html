// path: public/scripts/extensions/third-party/st-relationship-widget/settings.html
<div class="st-rel-settings-container">
    <h3><i class="fa-solid fa-heart"></i> Relationship Widget Settings</h3>
    <hr>
    
    <div class="st-rel-setting-row">
        <label for="st-rel-enable" class="st-rel-label">
            <span class="title">Enable Widget</span>
            <span class="desc">เปิด/ปิดการแสดงผลไอคอนลอยขอบจอ</span>
        </label>
        <label class="st-rel-ios-toggle">
            <input type="checkbox" id="st-rel-enable">
            <span class="st-rel-slider"></span>
        </label>
    </div>

    <div class="st-rel-setting-row">
        <label for="st-rel-idle" class="st-rel-label">
            <span class="title">Enable Idle Whispers</span>
            <span class="desc">ให้ตัวละครบ่นพึมพำเมื่อคุณปล่อยแชททิ้งไว้นานๆ</span>
        </label>
        <label class="st-rel-ios-toggle">
            <input type="checkbox" id="st-rel-idle">
            <span class="st-rel-slider"></span>
        </label>
    </div>

    <div class="st-rel-setting-row">
        <label for="st-rel-log" class="st-rel-label">
            <span class="title">Record Timeline</span>
            <span class="desc">บันทึกประวัติความสัมพันธ์ย้อนหลัง</span>
        </label>
        <label class="st-rel-ios-toggle">
            <input type="checkbox" id="st-rel-log">
            <span class="st-rel-slider"></span>
        </label>
    </div>
</div>
